services:
  db:
    image: postgres:16-alpine
    container_name: toetsscan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: toetsscan
      POSTGRES_PASSWORD: toetsscan
      POSTGRES_DB: toetsscan
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
